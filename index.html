  z-index: 99;

}

@keyframes flicker {

  97% { opacity:1; }

  overflow: hidden;
}
#trace-inner {

  background: linear-gradient(90deg, var(--orange), var(--red));

  transition: width 0.3s;
  box-shadow: 0 0 6px var(--red);

/* ── CANVAS ── */
#net-canvas {

  top: 48px; left: 0; right: 380px; bottom: 0;

/* ── SIDE PANEL ── */

  ["entrypoint", "couloir_nord"],

// Node positions (relative 0..1)

  entrypoint:      [0.50, 0.05],
  couloir_nord:    [0.50, 0.18],
  cameras:         [0.18, 0.22],
  badges:          [0.30, 0.35],

// ═══════════════════════════════════════════════════════════════════════════
// CANVAS ENGINE — PROGRESSIVE DISCOVERY
// ═══════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('net-canvas');
const ctx = canvas.getContext('2d');
let W, H;
let hoveredNode = null;
let selectedNode = null;
let animT = 0;

// ── DISCOVERY STATE ──────────────────────────────────────────────────────
// States: 'hidden' | 'scanning' | 'revealed' | 'breached'
const nodeState = {};
const scanProgress = {};
const revealProgress = {};
const scanRings = [];

Object.keys(NODES).forEach(k => {
  nodeState[k] = 'hidden';
  scanProgress[k] = 0;
  revealProgress[k] = 0;
});

// Start with entrypoint visible
nodeState['entrypoint'] = 'revealed';
revealProgress['entrypoint'] = 1;

// Adjacency map
const ADJACENCY = {};
Object.keys(NODES).forEach(k => ADJACENCY[k] = []);
EDGES.forEach(([a, b]) => {
  if (!ADJACENCY[a]) ADJACENCY[a] = [];
  if (!ADJACENCY[b]) ADJACENCY[b] = [];
  ADJACENCY[a].push(b);
  ADJACENCY[b].push(a);
});

function getReachableFromBreached() {
  const reachable = new Set();
  Object.keys(nodeState).forEach(k => {
    if (nodeState[k] === 'breached') {
      (ADJACENCY[k]||[]).forEach(nb => {
        if (nodeState[nb] === 'hidden') reachable.add(nb);
      });
    }
  });
  return reachable;
}

function isAccessible(key) {
  return nodeState[key] === 'revealed' || nodeState[key] === 'breached';
}

// Node type visual config
const TYPE_CFG = {
  entry:          { color: '#00ff88', glow: '#00ff88', shape: 'diamond', label: 'ENTRY' },
  infrastructure: { color: '#00ccff', glow: '#00ccff', shape: 'hex',     label: 'INFRA' },
  security:       { color: '#ff8800', glow: '#ff8800', shape: 'square',  label: 'SEC' },
  access:         { color: '#ffcc00', glow: '#ffcc00', shape: 'square',  label: 'ACCESS' },
  admin:          { color: '#ff44ff', glow: '#ff44ff', shape: 'hex',     label: 'ADMIN' },
  research:       { color: '#44ffcc', glow: '#44ffcc', shape: 'circle',  label: 'DATA' },
  personal:       { color: '#8888ff', glow: '#8888ff', shape: 'circle',  label: 'PERS' },
  critical:       { color: '#ffaa00', glow: '#ffaa00', shape: 'hex',     label: 'CRIT' },
  hostile:        { color: '#ff2244', glow: '#ff2244', shape: 'diamond', label: 'AGENT' },
};

function nodeIceThreat(node) {
  if (!node.ice || node.ice.length === 0) return null;
  if (node.ice.some(i => i.type === 'black')) return '#ff2244';
  if (node.ice.some(i => i.type === 'grey')) return '#ff8800';
  return '#00ccff';
}

function resize() {
  W = window.innerWidth - 380;
  H = window.innerHeight - 48 - 80;
  canvas.width = W;
  canvas.height = H;
}

function nx(rx) { return rx * W; }
function ny(ry) { return ry * H; }

function getNodeRadius(key) {
  const node = NODES[key];
  const base = Math.min(W, H) * 0.038;
  if (node.type === 'critical' || node.type === 'hostile') return base * 1.3;
  if (node.type === 'admin') return base * 1.15;
  if (node.type === 'entry') return base * 0.9;
  return base;
}

function hexPath(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 180) * (60 * i - 30);
    const px2 = x + r * Math.cos(a), py2 = y + r * Math.sin(a);
    if (i === 0) ctx.moveTo(px2, py2); else ctx.lineTo(px2, py2);
  }
  ctx.closePath();
}
function diamondPath(x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x, y-r); ctx.lineTo(x+r*0.7, y);
  ctx.lineTo(x, y+r); ctx.lineTo(x-r*0.7, y);
  ctx.closePath();
}
function squarePath(x, y, r) {
  const s = r * 0.9;
  ctx.beginPath(); ctx.rect(x-s, y-s, s*2, s*2);
}
function drawNodeShape(x, y, r, shape) {
  switch(shape) {
    case 'hex':     hexPath(x, y, r); break;
    case 'diamond': diamondPath(x, y, r); break;
    case 'square':  squarePath(x, y, r); break;
    default: ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); break;
  }
}

// ── EDGE DRAWING ─────────────────────────────────────────────────────────
function drawEdges() {
  EDGES.forEach(([a, b], edgeIdx) => {
    if (!NODE_POS[a] || !NODE_POS[b]) return;
    const stA = nodeState[a], stB = nodeState[b];
    const aVis = stA === 'revealed' || stA === 'breached' || stA === 'scanning';
    const bVis = stB === 'revealed' || stB === 'breached' || stB === 'scanning';
    if (!aVis && !bVis) return;

    const [ax, ay] = NODE_POS[a];
    const [bx, by] = NODE_POS[b];
    const x1 = nx(ax), y1 = ny(ay), x2 = nx(bx), y2 = ny(by);
    const ca = TYPE_CFG[NODES[a].type].color;
    const cb = TYPE_CFG[NODES[b].type].color;
    const bothVis = aVis && bVis;
    const alpha = bothVis ? '99' : '33';

    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    grad.addColorStop(0, ca + alpha);
    grad.addColorStop(1, cb + alpha);
    ctx.strokeStyle = grad;
    ctx.lineWidth = bothVis ? 3 : 1.5;
    ctx.setLineDash(bothVis ? [6, 5] : [3, 8]);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.setLineDash([]);

    // Animated data packet on breached edges
    if (stA === 'breached' && bVis) {
      const t = ((animT * 0.003 + edgeIdx * 0.13) % 1);
      const px2 = x1 + (x2-x1)*t, py2 = y1 + (y2-y1)*t;
      ctx.beginPath(); ctx.arc(px2, py2, 4, 0, Math.PI*2);
      ctx.fillStyle = ca + 'ff'; ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
    }
  });
}

// ── SCAN RINGS ───────────────────────────────────────────────────────────
function updateScanRings() {
  for (let i = scanRings.length - 1; i >= 0; i--) {
    scanRings[i].t += 0.025;
    if (scanRings[i].t >= 1) scanRings.splice(i, 1);
  }
  scanRings.forEach(ring => {
    const r = ring.baseR * (1 + ring.t * 2.5);
    const alpha = (1 - ring.t) * 0.7;
    ctx.beginPath(); ctx.arc(ring.x, ring.y, r, 0, Math.PI*2);
    ctx.strokeStyle = ring.color + Math.floor(alpha * 255).toString(16).padStart(2,'0');
    ctx.lineWidth = 2; ctx.stroke();
  });
}

// ── NODE DRAWING ──────────────────────────────────────────────────────────
function drawNode(key) {
  const st = nodeState[key];
  if (st === 'hidden') return;

  const node = NODES[key];
  const [rx, ry] = NODE_POS[key];
  const x = nx(rx), y = ny(ry);
  const r = getNodeRadius(key);
  const cfg = TYPE_CFG[node.type];
  const isHov = hoveredNode === key;
  const isSel = selectedNode === key;
  const threat = nodeIceThreat(node);
  const rp = revealProgress[key];

  ctx.save();
  ctx.globalAlpha = rp;

  if (st === 'scanning') {
    const sp = scanProgress[key];
    ctx.globalAlpha = rp * (0.3 + sp * 0.7);
    // Rotating scan arc
    ctx.beginPath();
    ctx.arc(x, y, r * 1.6, -Math.PI/2, -Math.PI/2 + sp * Math.PI * 2);
    ctx.strokeStyle = cfg.color; ctx.lineWidth = 2; ctx.stroke();
    // Dashed ring
    ctx.setLineDash([3, 5]);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.strokeStyle = cfg.color + '44'; ctx.lineWidth = 1; ctx.stroke();
    ctx.setLineDash([]);
    // Scanning label
    ctx.font = `${Math.max(7, r*0.35)}px 'Share Tech Mono'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = cfg.color + '88';
    ctx.fillText('SCAN...', x, y);
    ctx.restore();
    return;
  }

  const isBreached = st === 'breached';

  // Pulsing threat ring
  if (threat && !isBreached && (node.type === 'critical' || node.type === 'hostile' || node.ice?.some(i=>i.type==='black'))) {
    const pulse = 0.5 + 0.5 * Math.sin(animT * 0.05);
    ctx.beginPath(); ctx.arc(x, y, r + 6 + pulse * 5, 0, Math.PI*2);
    ctx.strokeStyle = threat + Math.floor(pulse * 160).toString(16).padStart(2,'0');
    ctx.lineWidth = 1.5; ctx.stroke();
  }

  // Breached pulse ring
  if (isBreached) {
    const pulse = 0.5 + 0.5 * Math.sin(animT * 0.08);
    ctx.beginPath(); ctx.arc(x, y, r + 4 + pulse * 3, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,68,${0.3 + pulse * 0.3})`;
    ctx.lineWidth = 1.5; ctx.stroke();
  }

  // Glow halo
  const glowR = isHov || isSel ? r * 2.5 : r * 1.9;
  const glow = ctx.createRadialGradient(x, y, r*0.3, x, y, glowR);
  const glowCol = isBreached ? '#00ff44' : isSel ? '#ffffff' : cfg.glow;
  glow.addColorStop(0, glowCol + '55'); glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI*2); ctx.fill();

  // ICE threat ring
  if (threat && !isBreached) {
    drawNodeShape(x, y, r+5, cfg.shape);
    ctx.strokeStyle = threat + 'bb'; ctx.lineWidth = 2.5; ctx.stroke();
  }

  // Main fill
  drawNodeShape(x, y, r, cfg.shape);
  const bg = ctx.createRadialGradient(x, y-r*0.3, 0, x, y, r);
  const fillCol = isBreached ? '#00ff44' : cfg.color;
  bg.addColorStop(0, fillCol + (isBreached ? '55' : '66'));
  bg.addColorStop(1, fillCol + '22');
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = isBreached ? '#00ff44' : isSel ? '#ffffff' : isHov ? cfg.color : cfg.color+'dd';
  ctx.lineWidth = isSel ? 4 : isHov ? 3.5 : isBreached ? 3.5 : 2.5;
  ctx.stroke();

  if (isBreached) {
    ctx.font = `bold ${r * 0.55}px 'Share Tech Mono'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,255,68,0.9)';
    ctx.fillText('\u2713', x, y);
  } else {
    ctx.strokeStyle = cfg.color + '55'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x-r*0.4, y); ctx.lineTo(x+r*0.4, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y-r*0.4); ctx.lineTo(x, y+r*0.4); ctx.stroke();

    if (node.ice && node.ice.length > 0) {
      const bx2 = x+r*0.65, by2 = y-r*0.65, br2 = 7;
      ctx.beginPath(); ctx.arc(bx2, by2, br2, 0, Math.PI*2);
      ctx.fillStyle = threat; ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${br2*1.2}px 'Share Tech Mono'`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(node.ice.length, bx2, by2);
    }

    ctx.font = `bold ${Math.max(9, r*0.4)}px 'Share Tech Mono'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillText(node.id, x+1, y+1);
    ctx.fillStyle = isSel ? '#ffffff' : cfg.color; ctx.fillText(node.id, x, y);
  }

  ctx.font = `${Math.max(7, r*0.3)}px 'Share Tech Mono'`;
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillText(isBreached ? 'PWND' : `FW:${node.fw}`, x+1, y+r+10);
  ctx.fillStyle = isBreached ? '#00ff44ff' : (threat ? threat+'ff' : cfg.color+'cc');
  ctx.fillText(isBreached ? 'PWND' : `FW:${node.fw}`, x, y+r+10);

  ctx.font = `${Math.max(6, r*0.28)}px 'Share Tech Mono'`;
  ctx.fillStyle = isBreached ? '#00ff4499' : cfg.color+'99';
  ctx.fillText(isBreached ? 'ACCESS OK' : cfg.label, x, y-r-8);

  ctx.restore();
}

// Ghost outlines for detectable-but-not-yet-scanning nodes
function drawGhostNodes() {
  const reachable = getReachableFromBreached();
  reachable.forEach(key => {
    if (nodeState[key] !== 'hidden') return;
    if (!NODE_POS[key]) return;
    const [rx, ry] = NODE_POS[key];
    const x = nx(rx), y = ny(ry);
    const r = getNodeRadius(key);
    const cfg = TYPE_CFG[NODES[key].type];

    ctx.save();
    ctx.globalAlpha = 0.15 + 0.06 * Math.sin(animT * 0.04);
    ctx.setLineDash([3, 6]);
    drawNodeShape(x, y, r, cfg.shape);
    ctx.strokeStyle = cfg.color; ctx.lineWidth = 1; ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = `${Math.max(6, r*0.28)}px 'Share Tech Mono'`;
    ctx.fillStyle = cfg.color + '88';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('???', x, y);
    ctx.restore();
  });
}

function drawBackground() {
  ctx.fillStyle = '#000200';
  ctx.fillRect(0, 0, W, H);
  const size = 28;
  const cols = Math.ceil(W / (size*1.73)) + 2;
  const rows = Math.ceil(H / (size*1.5)) + 2;
  ctx.strokeStyle = 'rgba(0,255,200,0.07)';
  ctx.lineWidth = 0.8;
  for (let row = -1; row < rows; row++) {
    for (let col = -1; col < cols; col++) {
      const x = col*size*1.73 + (row%2)*size*0.87;
      const y = row*size*1.5;
      hexPath(x, y, size*0.95); ctx.stroke();
    }
  }
}

// ── SCAN TICK ─────────────────────────────────────────────────────────────
function tickScanning() {
  Object.keys(nodeState).forEach(k => {
    if (nodeState[k] === 'scanning') {
      scanProgress[k] = Math.min(1, scanProgress[k] + 0.008);
      revealProgress[k] = Math.min(1, revealProgress[k] + 0.04);
      if (scanProgress[k] >= 1) {
        nodeState[k] = 'revealed';
        revealProgress[k] = 1;
        const [rx, ry] = NODE_POS[k];
        const x = nx(rx), y = ny(ry);
        const r = getNodeRadius(k);
        const col = TYPE_CFG[NODES[k].type].color;
        for (let i = 0; i < 3; i++) scanRings.push({ x, y, t: i*0.15, baseR: r, color: col });
        addLog(`NODE ${NODES[k].id} IDENTIFI\u00c9 \u2014 ${NODES[k].name}`, 'ok');
        if (NODES[k].ice?.some(i => i.type === 'black'))
          addLog(`\u26a0 GLACE NOIRE D\u00c9TECT\u00c9E SUR ${NODES[k].id} \u2014 BLACK ICE ACTIVE`, 'danger');
      }
    }
    if ((nodeState[k] === 'revealed' || nodeState[k] === 'breached') && revealProgress[k] < 1)
      revealProgress[k] = Math.min(1, revealProgress[k] + 0.06);
  });
}

function draw() {
  tickScanning();
  drawBackground();
  updateScanRings();
  drawEdges();
  drawGhostNodes();
  Object.keys(NODES).forEach(key => { if (NODE_POS[key]) drawNode(key); });
  animT++;
  requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════════════════════
// BREACH LOG
// ═══════════════════════════════════════════════════════════════════════════
function addLog(msg, cls) {
  cls = cls || 'msg';
  const log = document.getElementById('breach-log');
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = `<span class="ts">[${ts}]</span><span class="msg ${cls}">${msg}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════════════════
// HIT TEST
// ═══════════════════════════════════════════════════════════════════════════
function getNodeAt(mx, my) {
  let best = null, bestDist = Infinity;
  Object.keys(NODES).forEach(key => {
    if (!NODE_POS[key] || !isAccessible(key)) return;
    const [rx, ry] = NODE_POS[key];
    const x = nx(rx), y = ny(ry);
    const r = getNodeRadius(key);
    const d = Math.hypot(mx-x, my-y);
    if (d < r+6 && d < bestDist) { best = key; bestDist = d; }
  });
  return best;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const key = getNodeAt(e.clientX-rect.left, e.clientY-rect.top);
  hoveredNode = key;
  canvas.style.cursor = key ? 'pointer' : 'crosshair';
  const tip = document.getElementById('tooltip');
  if (key) {
    const node = NODES[key];
    tip.style.display = 'block';
    tip.style.left = (e.clientX+14)+'px';
    tip.style.top  = (e.clientY-10)+'px';
    const st = nodeState[key];
    tip.innerHTML = `${node.id} \u2014 ${node.name}<br><span style="color:#ff8800">ICE: ${node.ice.length}</span> \u00b7 <span style="color:#00ffcc">FW: ${node.fw}</span> \u00b7 <span style="color:${st==='breached'?'#00ff44':'#ffee00'}">${st.toUpperCase()}</span>`;
  } else { tip.style.display = 'none'; }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const key = getNodeAt(e.clientX-rect.left, e.clientY-rect.top);
  if (key) { selectedNode = key; showNodeInfo(key); }
});

// ═══════════════════════════════════════════════════════════════════════════
// BREACH ACTION
// ═══════════════════════════════════════════════════════════════════════════
function breachNode(key) {
  if (nodeState[key] !== 'revealed') return;
  const node = NODES[key];
  nodeState[key] = 'breached';

  tracePct = Math.min(99, tracePct + (node.fw * 1.8 + (node.ice?.some(i=>i.type==='black') ? 12 : 4)));
  document.getElementById('trace-inner').style.width = tracePct + '%';
  document.getElementById('trace-pct').textContent = tracePct.toFixed(0) + '%';
  if (tracePct > 75) document.getElementById('trace-inner').style.background = 'linear-gradient(90deg,#ff4400,#ff0000)';
  else if (tracePct > 50) document.getElementById('trace-inner').style.background = 'linear-gradient(90deg,#ffaa00,#ff4400)';

  addLog(`>>> INTRUSION ${node.id} \u2014 ${node.name}`, 'ok');
  if (node.ice.length > 0) addLog(`CONTOURNEMENT: ${node.ice.map(i=>i.name).join(', ')}`, 'warn');
  node.data.forEach(d => { if (d.value==='OBJECTIF') addLog(`\u29d0 OBJECTIF ATTEINT: ${d.name}`, 'ok'); });
  if (tracePct > 75) addLog('\u26a0 TRACE CRITIQUE \u2014 D\u00c9CONNEXION IMMINENTE', 'danger');

  // Start scanning adjacent hidden nodes
  (ADJACENCY[key]||[]).forEach(nb => {
    if (nodeState[nb] === 'hidden') {
      nodeState[nb] = 'scanning';
      scanProgress[nb] = 0;
      revealProgress[nb] = 0;
      addLog(`SCAN N\u0152UD ADJACENT ${NODES[nb].id}...`, 'msg');
    }
  });

  showNodeInfo(key);
}

// ═══════════════════════════════════════════════════════════════════════════
// SIDE PANEL
// ═══════════════════════════════════════════════════════════════════════════
function showNodeInfo(key) {
  const node = NODES[key];
  const st = nodeState[key];
  document.getElementById('panel-node-id').textContent = node.id;
  document.getElementById('panel-node-name').textContent = node.name;
  document.getElementById('default-state').style.display = 'none';
  const info = document.getElementById('node-info');
  info.style.display = 'block';

  const cfg = TYPE_CFG[node.type];
  const hasBlack = node.ice?.some(i => i.type === 'black');
  const isBreached = st === 'breached';
  const adjacentBreached = (ADJACENCY[key]||[]).some(nb => nodeState[nb] === 'breached');
  const isEntry = key === 'entrypoint';
  const canAct = !isBreached && (isEntry || adjacentBreached);

  const iceHTML = node.ice.map(ice => `
    <div class="ice-item ${ice.type}">
      <div class="ice-icon">${ice.icon}</div>
      <div class="ice-info"><div class="ice-name">${ice.name}</div><div class="ice-desc">${ice.desc}</div></div>
      <div class="ice-rating">${ice.rating}</div>
    </div>`).join('');

  const dataHTML = node.data.length > 0
    ? node.data.map(d => `<div class="data-item"><span class="data-icon">${d.icon}</span><span>${d.name}</span><span class="data-val">${d.value}</span></div>`).join('')
    : '<div style="font-size:0.62rem;color:#335544;padding:4px 0">\u2014 Pas de donn\u00e9es extractibles \u2014</div>';

  let btnLabel, btnClass, btnDisabled;
  if (isBreached) { btnLabel = '\u25c8 N\u0152UD COMPROMIS'; btnClass = 'hacked'; btnDisabled = true; }
  else if (!canAct) { btnLabel = '\u2298 ACC\u00c8S NON \u00c9TABLI'; btnClass = ''; btnDisabled = true; }
  else { btnLabel = `\u25c8 FRANCHIR ${node.id}`; btnClass = ''; btnDisabled = false; }

  info.innerHTML = `
    <div class="p-block">
      <h3>Statistiques R\u00e9seau</h3>
      <div class="stat-row"><span class="sk">\u00c9TAT</span><span class="sv ${isBreached?'ok':'warn'}">${st.toUpperCase()}</span></div>
      <div class="stat-row"><span class="sk">FIREWALL</span><span class="sv ${node.fw>=8?'danger':node.fw>=6?'warn':'ok'}">${node.fw}</span></div>
      <div class="stat-row"><span class="sk">ATTAQUE IC</span><span class="sv ${node.attack>=8?'danger':node.attack>=5?'warn':'ok'}">${node.attack||'\u2014'}</span></div>
      <div class="stat-row"><span class="sk">TYPE N\u0152UD</span><span class="sv" style="color:${cfg.color}">${cfg.label}</span></div>
      <div class="stat-row"><span class="sk">GLACES ACTIVES</span><span class="sv ${hasBlack?'danger':'warn'}">${node.ice.length}</span></div>
    </div>
    ${node.ice.length > 0 ? `<div class="p-block"><h3>Glaces \u2014 ICE D\u00e9tect\u00e9es</h3>${iceHTML}</div>` : ''}
    <div class="p-block"><h3>Donn\u00e9es Extractibles</h3>${dataHTML}</div>
    <div class="p-block"><h3>Notes Decker</h3><div class="decker-note"><span class="prompt">&gt;</span>${node.note}</div></div>
    <button id="hack-btn" class="${btnClass}" ${btnDisabled?'disabled':''} onclick="breachNode('${key}')">${btnLabel}</button>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// TRACE
// ═══════════════════════════════════════════════════════════════════════════
let tracePct = 0;
setInterval(() => {
  tracePct = Math.min(99, tracePct + 0.04);
  document.getElementById('trace-inner').style.width = tracePct + '%';
  document.getElementById('trace-pct').textContent = tracePct.toFixed(0) + '%';
}, 300);

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener('resize', resize);
resize();
draw();
setTimeout(() => addLog('CONNEXION \u00c9TABLIE \u2014 HOST MCT-XENOBIO-DELTA NIVEAU 8', 'ok'), 300);
setTimeout(() => addLog('SCAN INITIAL... N\u0152UD D\'ENTR\u00c9E D\u00c9TECT\u00c9', 'msg'), 800);
setTimeout(() => addLog('ATTENTION: PROBE ICE ACTIF \u2014 TRACE EN COURS', 'warn'), 1400);

</script>
</body>
</html>
